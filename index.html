<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Language Mastery App</title>
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #2563eb; 
            --desk-bg: #1e293b; 
            --paper-front: #fffdfa; 
            --paper-back: #e0f2fe; 
            --btn-green: #22c55e;
            --btn-red: #ef4444;
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--desk-bg); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
            touch-action: pan-y;
            color: white;
        }
        
        /* Menu System */
        .screen {
            display: none; flex-direction: column; align-items: center;
            width: 100%; height: 100%; padding-top: 5vh;
            box-sizing: border-box; animation: fadeIn 0.4s ease-out;
        }
        .active-screen { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-title { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; margin-bottom: 10px; text-align: center; }
        .menu-subtitle { color: #94a3b8; font-size: 1.1rem; margin-bottom: 40px; }

        .menu-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 15px; padding: 20px 30px; margin-bottom: 20px;
            width: 85%; max-width: 350px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; backdrop-filter: blur(5px); transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .menu-btn:active { transform: scale(0.96); }
        
        .nav-back {
            position: absolute; top: 20px; left: 20px; background: transparent;
            border: none; color: #94a3b8; font-size: 1rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 100;
        }
        .nav-back:active { color: white; }

        .top-bar {
            display: flex; flex-direction: column; align-items: center;
            gap: clamp(10px, 2vh, 20px); margin-bottom: clamp(15px, 3vh, 30px); width: 100%;
        }

        .counter { font-weight: bold; color: #cbd5e1; font-size: clamp(1rem, 2vw, 1.2rem); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        .top-controls { display: flex; align-items: center; gap: 15px; }

        .sleek-switch {
            width: clamp(200px, 45vw, 240px); height: clamp(34px, 5vh, 40px);
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; position: relative; display: flex; cursor: pointer;
            backdrop-filter: blur(5px); overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .switch-label {
            flex: 1; text-align: center; line-height: clamp(32px, 5vh, 38px);
            color: white; font-size: clamp(0.75rem, 2vw, 0.9rem); font-weight: 800; z-index: 2; user-select: none;
        }

        .switch-slider {
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            background: var(--accent); border-radius: 20px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .top-action-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 20px; padding: 0 16px; height: clamp(34px, 5vh, 40px); 
            display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; 
            backdrop-filter: blur(5px); transition: transform 0.2s, background 0.2s; 
            font-size: clamp(0.75rem, 2vw, 0.9rem); font-weight: 800;
        }
        .top-action-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.25); }

        .deck-area {
            display: flex; align-items: center; justify-content: center;
            width: 100%; position: relative; max-width: 600px;
        }

        .arrow-btn {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; 
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); 
            color: white; border-radius: 50%; width: clamp(46px, 11vw, 64px); height: clamp(46px, 11vw, 64px);
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        .arrow-left { left: 2vw; }
        .arrow-right { right: 2vw; }
        .arrow-btn:active { transform: translateY(-50%) scale(0.85); background: rgba(255,255,255,0.3); }
        .arrow-btn svg { width: 55%; height: 55%; }

        .card-stack {
            width: clamp(280px, 82vw, 460px); max-height: 72vh; aspect-ratio: 3 / 4.2; 
            position: relative; perspective: 1200px;
        }

        .card-stack::before, .card-stack::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f1f5f9;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            border-radius: 5%; border: 1px solid #cbd5e1; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .card-stack::before { transform: rotate(3deg) translate(4px, 4px); z-index: 0; }
        .card-stack::after { transform: rotate(-2deg) translate(-4px, 8px); z-index: -1; }

        .animate-wrapper {
            width: 100%; height: 100%; position: relative; z-index: 2;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
        }
        .swipe-left { transform: translateX(-120%) rotate(-10deg); opacity: 0; }
        .swipe-right { transform: translateX(120%) rotate(10deg); opacity: 0; }

        .card { 
            width: 100%; height: 100%; position: relative; 
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d; cursor: pointer; 
            border-radius: 5%; box-shadow: -5px 10px 20px rgba(0,0,0,0.4);
        }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 5%; box-sizing: border-box; border-radius: 5%; text-align: center; border: 1px solid #cbd5e1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }
        
        .front-face { background-color: var(--paper-front); color: var(--primary); }
        .back-face { background-color: var(--paper-back); color: var(--primary); transform: rotateY(180deg); }
        
        .card.is-flipped .front-face { visibility: hidden; transition: visibility 0s 0.2s; }
        .card:not(.is-flipped) .front-face { visibility: visible; transition: visibility 0s 0.2s; }
        .card:not(.is-flipped) .back-face { visibility: hidden; transition: visibility 0s 0.2s; }
        .card.is-flipped .back-face { visibility: visible; transition: visibility 0s 0.2s; }
        
        .card-img {
            max-height: 40%; max-width: 85%; margin-bottom: 5%; border-radius: 8px;
            display: none; mix-blend-mode: multiply; object-fit: contain;
        }

        .eng-text { direction: ltr; font-weight: 800; font-family: -apple-system, sans-serif; margin: 0; color: #1e293b; }
        .latin-text { direction: ltr; font-weight: 800; font-family: -apple-system, sans-serif; margin: 0; color: #0f172a; }
        .arb-text { direction: rtl; font-weight: bold; font-family: 'Times New Roman', Times, serif; line-height: 1.1; word-wrap: break-word; margin: 0; color: #0f172a; text-shadow: 0px 1px 1px rgba(255,255,255,0.5); }

        .speaker-icon {
            position: absolute; bottom: clamp(15px, 4%, 25px); right: clamp(15px, 4%, 25px);
            width: clamp(44px, 12%, 60px); height: clamp(44px, 12%, 60px);
            background: var(--accent); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; z-index: 10;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            transform: translateZ(1px); transition: transform 0.1s, background 0.1s;
        }
        .speaker-icon:active { transform: translateZ(1px) scale(0.9); background: #1d4ed8; }
        .speaker-icon svg { width: 50%; height: 50%; }

        .controls { 
            margin-top: clamp(20px, 3vh, 35px); display: grid; grid-template-columns: 1fr 1fr; 
            gap: 12px; width: 85%; max-width: 450px; 
        }
        
        button.action-btn { 
            padding: clamp(10px, 2.5vh, 16px); border: none; border-radius: 12px; background: rgba(255,255,255,0.9); 
            font-weight: 800; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-size: clamp(0.9rem, 2.5vw, 1.05rem); 
            cursor: pointer; transition: all 0.1s;
        }
        button.action-btn:active { transform: scale(0.94) translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .btn-not-yet { background: var(--btn-red) !important; color: white !important; }
        .btn-mastered { background: var(--btn-green) !important; color: white !important; }
        
        .instruction { margin-top: clamp(10px, 2vh, 20px); color: #94a3b8; font-size: clamp(0.75rem, 1.5vw, 0.85rem); letter-spacing: 0.5px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div id="screen-lang" class="screen active-screen">
        <div class="menu-title">Language Hub</div>
        <div class="menu-subtitle">Choose a language to study</div>
        <button class="menu-btn" onclick="navToMode('arb')">🇱🇧 Levantine Arabic <span>▶</span></button>
        <button class="menu-btn" onclick="navToMode('srb')">🇷🇸 Serbian <span>▶</span></button>
        <button class="menu-btn" onclick="navToMode('spa')">🇲🇽 Spanish (Latin Am) <span>▶</span></button>
        <button class="menu-btn" style="opacity: 0.5; cursor: default;">🇫🇷 French (Coming Soon)</button>
    </div>

    <div id="screen-mode" class="screen">
        <button class="nav-back" onclick="navTo('screen-lang')">◀ Back</button>
        <div class="menu-title">Select Mode</div>
        <div class="menu-subtitle" id="modeSubtitle">Language</div>
        <button class="menu-btn" onclick="startDeck('vocab')">📚 Vocabulary Builder <span>▶</span></button>
        <button class="menu-btn" id="btnConjMode" onclick="startDeck('conj')">🔄 Conjugation Driller <span>▶</span></button>
    </div>

    <div id="screen-deck" class="screen">
        <button class="nav-back" onclick="navTo('screen-mode')">◀ Menu</button>
        <div class="top-bar" style="margin-top: 30px;">
            <div class="counter" id="counter">Loading...</div>
            <div class="top-controls">
                <div class="sleek-switch" onclick="toggleLang()">
                    <div class="switch-slider" id="switchSlider"></div>
                    <span class="switch-label" id="lblEng">Eng ➔ Target</span>
                    <span class="switch-label" id="lblTarget">Target ➔ Eng</span>
                </div>
                <button class="top-action-btn" onclick="shuffle()" title="Shuffle Deck">🔀 Shuffle</button>
            </div>
        </div>

        <div class="deck-area">
            <div class="arrow-btn arrow-left" onclick="move(-1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>

            <div class="card-stack" id="cardContainer">
                <div class="animate-wrapper" id="animator">
                    <div class="card" id="card">
                        <div class="face front-face">
                            <img id="frontImg" class="card-img" src="" alt="">
                            <p id="frontText">Front</p>
                            <div id="frontSpeaker" class="speaker-icon" onclick="playAudio(event)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                            </div>
                        </div>
                        <div class="face back-face">
                            <img id="backImg" class="card-img" src="" alt="">
                            <p id="backText">Back</p>
                            <div id="backSpeaker" class="speaker-icon" onclick="playAudio(event)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="arrow-btn arrow-right" onclick="move(1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
        </div>
        <div class="instruction">Tap card to flip • Swipe to skip</div>
        <div class="controls">
            <button class="action-btn btn-not-yet" onclick="needsWork()">✖ Not Yet</button>
            <button class="action-btn btn-mastered" onclick="removeCard()">✓ Mastered</button>
        </div>
    </div>

        // ------------------ APP LOGIC ------------------ //

        let currentDeck = [];
        let cur = 0;
        let isAnimating = false;
        let isTargetFirst = false;
        let isVocabMode = true;
        let currentLang = 'arb'; 

        const card = document.getElementById('card');
        const animator = document.getElementById('animator');
        const frontText = document.getElementById('frontText');
        const backText = document.getElementById('backText');
        const frontImg = document.getElementById('frontImg');
        const backImg = document.getElementById('backImg');
        const frontSpeaker = document.getElementById('frontSpeaker');
        const backSpeaker = document.getElementById('backSpeaker');
        const counter = document.getElementById('counter');
        const container = document.getElementById('cardContainer');
        const switchSlider = document.getElementById('switchSlider');
        
        const lblTarget = document.getElementById('lblTarget');
        const modeSubtitle = document.getElementById('modeSubtitle');

        function navTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function navToMode(lang) {
            currentLang = lang;
            if (lang === 'arb') {
                modeSubtitle.innerText = "🇱🇧 Levantine Arabic";
                lblTarget.innerText = "Arb ➔ Eng";
            } else if (lang === 'srb') {
                modeSubtitle.innerText = "🇷🇸 Serbian";
                lblTarget.innerText = "Srb ➔ Eng";
            } else if (lang === 'spa') {
                modeSubtitle.innerText = "🇲🇽 Latin American Spanish";
                lblTarget.innerText = "Spa ➔ Eng";
            }
            navTo('screen-mode');
        }

        function startDeck(mode) {
            isVocabMode = (mode === 'vocab');
            if (currentLang === 'arb') {
                currentDeck = isVocabMode ? [...vocabDataArb] : [...conjDataArb];
            } else if (currentLang === 'srb') {
                currentDeck = isVocabMode ? [...vocabDataSrb] : [...conjDataSrb]; 
            } else if (currentLang === 'spa') {
                currentDeck = isVocabMode ? [...vocabDataSpa] : [...conjDataSpa]; 
            }
            
            cur = 0;
            isTargetFirst = false;
            switchSlider.style.transform = 'translateX(0)';
            
            setCardContent();
            navTo('screen-deck');
        }

        function toggleLang() {
            if(isAnimating) return;
            isTargetFirst = !isTargetFirst;
            switchSlider.style.transform = isTargetFirst ? 'translateX(100%)' : 'translateX(0)';
            flipAndLoad();
        }

        function getBaseName(englishWord) {
            let filename = englishWord.toLowerCase().replace(/[^a-z0-9]/g, '-');
            return filename.replace(/-+/g, '-').replace(/^-|-$/g, '');
        }

        function loadSmartImage(imgElement, baseName, showImage) {
            if (!showImage || !isVocabMode) {
                imgElement.style.display = "none";
                imgElement.src = "";
                return;
            }

            const extensions = ['.jpg', '.png', '.jpeg', '.gif'];
            let currentExtIndex = 0;

            imgElement.style.display = "none";
            
            imgElement.onload = function() {
                if (showImage && isVocabMode) imgElement.style.display = "block";
            };

            imgElement.onerror = function() {
                currentExtIndex++;
                if (currentExtIndex < extensions.length) {
                    imgElement.src = "images/" + baseName + extensions[currentExtIndex];
                } else {
                    imgElement.style.display = "none"; 
                }
            };

            imgElement.src = "images/" + baseName + extensions[0];
        }

        function setCardContent() {
            if (currentDeck.length === 0) {
                frontText.innerText = "Deck Finished!";
                backText.innerText = "All mastered!";
                counter.innerText = "0 Cards Left";
                frontImg.style.display = "none";
                backImg.style.display = "none";
                frontSpeaker.style.display = "none";
                backSpeaker.style.display = "none";
                return;
            }

            const currentCard = currentDeck[cur];
            const baseName = getBaseName(currentCard.e);
            
            const engSize = isVocabMode ? "clamp(1.8rem, 6vw, 3rem)" : "clamp(1.4rem, 4.5vw, 2.2rem)";
            let targetClass = currentLang === 'arb' ? 'arb-text' : 'latin-text';
            let targetSize = currentLang === 'arb' ? 
                             (isVocabMode ? "clamp(4.2rem, 12vw, 7.5rem)" : "clamp(2.8rem, 9vw, 4.5rem)") : engSize;
            
            if (!isTargetFirst) { 
                loadSmartImage(frontImg, baseName, true);
                loadSmartImage(backImg, baseName, false);
                
                frontText.innerText = currentCard.e;
                frontText.className = "eng-text";
                frontText.style.fontSize = engSize;
                
                backText.innerText = currentCard.t;
                backText.className = targetClass;
                backText.style.fontSize = targetSize;

                frontSpeaker.style.display = "none";
                backSpeaker.style.display = "flex";
            } else { 
                loadSmartImage(frontImg, baseName, false);
                loadSmartImage(backImg, baseName, true);
                
                frontText.innerText = currentCard.t;
                frontText.className = targetClass;
                frontText.style.fontSize = targetSize;
                
                backText.innerText = currentCard.e;
                backText.className = "eng-text";
                backText.style.fontSize = engSize;

                frontSpeaker.style.display = "flex";
                backSpeaker.style.display = "none";
            }
            counter.innerText = `Card ${cur + 1} of ${currentDeck.length}`;
        }

        function flipAndLoad() {
            card.classList.remove('is-flipped');
            setTimeout(setCardContent, 150);
        }

        function move(dir) {
            if (currentDeck.length === 0 || isAnimating) return;
            isAnimating = true;

            if (dir === 1) animator.classList.add('swipe-left');
            else animator.classList.add('swipe-right');

            setTimeout(() => {
                cur = (cur + dir + currentDeck.length) % currentDeck.length;
                setCardContent(); 
                card.classList.remove('is-flipped'); 

                animator.style.transition = 'none';
                animator.classList.remove('swipe-left', 'swipe-right');
                
                if (dir === 1) animator.classList.add('swipe-right'); 
                else animator.classList.add('swipe-left'); 

                void animator.offsetWidth;
                animator.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s';
                animator.classList.remove('swipe-left', 'swipe-right');

                setTimeout(() => { isAnimating = false; }, 400);
            }, 300); 
        }

        function shuffle() {
            if (currentDeck.length === 0 || isAnimating) return;
            for (let i = currentDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
            }
            cur = 0;
            flipAndLoad();
        }

        function needsWork() {
            if (currentDeck.length === 0 || isAnimating) return;
            const currentCard = currentDeck[cur];
            const remainingCards = currentDeck.length - cur - 1;
            
            for(let i = 0; i < 2; i++) {
                let insertPos;
                if (remainingCards > 2) {
                    insertPos = cur + 1 + Math.floor(Math.random() * remainingCards);
                } else {
                    insertPos = Math.floor(Math.random() * currentDeck.length);
                }
                currentDeck.splice(insertPos, 0, {...currentCard});
            }
            move(1);
        }

        function removeCard() {
            if (currentDeck.length === 0 || isAnimating) return;
            currentDeck.splice(cur, 1); 
            if (cur >= currentDeck.length) cur = 0; 
            
            animator.style.transform = 'translateY(150%) rotate(10deg)';
            animator.style.opacity = '0';
            
            setTimeout(() => {
                setCardContent();
                card.classList.remove('is-flipped');
                
                animator.style.transition = 'none';
                animator.style.transform = 'translateY(-50%) rotate(-10deg)';
                void animator.offsetWidth;
                
                animator.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s';
                animator.style.transform = 'translateY(0) rotate(0)';
                animator.style.opacity = '1';
            }, 300);
        }

        function playAudio(event) {
            event.stopPropagation(); 
            if (currentDeck.length === 0) return;
            
            if ('speechSynthesis' in window) {
                let targetWord = currentDeck[cur].t;
                let utterance = new SpeechSynthesisUtterance(targetWord);
                
                if (currentLang === 'arb') {
                    utterance.lang = 'ar-SA'; 
                } else if (currentLang === 'srb') {
                    utterance.lang = 'sr-RS'; 
                } else if (currentLang === 'spa') {
                    utterance.lang = 'es-MX';
                }
                
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser does not support text-to-speech audio.");
            }
        }

        container.addEventListener('click', () => {
            if(!isAnimating) card.classList.toggle('is-flipped');
        });

        let startX = 0;
        container.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX);
        container.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].screenX;
            if (startX - endX > 50) move(1);       
            else if (endX - startX > 50) move(-1); 
        });

    </script>
